<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Comfort Not Found | Richfield Chair</title>
    <style>
        /* --- PREMIUM FURNITURE MINIMALIST THEME --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', 'Georgia', serif; /* Elegant, premium typography */
        }

        body {
            background-color: #121212; /* Deep charcoal luxury dark mode */
            color: #f5f5f7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 650px;
            width: 100%;
        }

        /* Large Elegant 404 Typography */
        .error-code {
            font-size: 11rem;
            font-weight: 300;
            line-height: 1;
            color: #d4af37; /* Premium Gold metallic color */
            letter-spacing: -4px;
            margin-bottom: 10px;
            text-shadow: 0px 4px 20px rgba(212, 175, 55, 0.15);
            animation: subtleScale 4s ease-in-out infinite alternate;
        }

        /* Clean Sans-Serif accents for scannability */
        .brand-name {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: #8e8e93;
            margin-bottom: 25px;
        }

        .error-heading {
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .error-text {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #a1a1a6;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 45px;
            font-weight: 300;
        }

        /* Luxury Gold Button Button */
        .home-btn {
            display: inline-block;
            text-decoration: none;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 15px 40px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .home-btn:hover {
            background: #d4af37;
            color: #121212;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }

        .home-btn:active {
            transform: translateY(0);
        }

        /* Luxury Ambient Light Background Effect */
        .ambient-glow {
            position: absolutegit init
            ;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Subtle Breathing Animation */
        @keyframes subtleScale {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.03);
            }
        }
    </style>
</head>
<body>

    <!-- Subtle luxury background glow -->
    <div class="ambient-glow"></div>

    <!-- --- HTML STRUCTURE --- -->
    <div class="container">
        <div class="brand-name">Richfield Chair Co.</div>
        <div class="error-code">404</div>
        <h1 class="error-heading">Out of Alignment</h1>
        <p class="error-text">
            Just like an unergonomic posture, something here is slightly off. The design or collection piece you are searching for cannot be found. Let us help you find a better place to rest.
        </p>
        <!-- Change the "#" to your homepage link (e.g., "/" or "index.html") -->
        <a href="#" class="home-btn">Return To Showroom</a>
    </div>

</body>
</html>
